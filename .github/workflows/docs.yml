# 工作流名称
name: 部署 前端编码规范 静态文档

# 触发条件：推送到 main 分支，或手动触发
on:
  push:
    branches:
      - main
  workflow_dispatch:

# 权限设置：允许 GitHub Pages 部署
permissions:
  contents: read
  pages: write
  id-token: write

# 并发控制：避免同时部署冲突
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # 构建任务
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 启用 lastUpdated 时需要

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: '11.7.0'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm run init

      - name: Build VitePress site
        run: pnpm run docs:build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist  # VitePress 默认构建输出路径

  # 部署任务
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4